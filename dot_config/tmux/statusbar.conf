# TokyoNight Storm Status Bar
#
# Palette (official TokyoNight Storm from folke/tokyonight.nvim):
#   #1f2335  bg_dark / bg_statusline
#   #292e42  bg_highlight (raised surface)
#   #1d202f  black (dark text on colored bg)
#   #565f89  comment (inactive/dim)
#   #c0caf5  fg
#   #7aa2f7  blue (session pill)
#   #e0af68  yellow (prefix, zoom)
#   #ff9e64  orange (cpu)
#   #7dcfff  cyan (ram)
#   #f7768e  red
#   #9ece6a  green
#   #bb9af7  magenta (custom sections)

set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g status-left-length 100
set -g status-right-length 100
set -g status-interval 2
set -g clock-mode-style 12
set -g message-style "bg=#1f2335,fg=#c0caf5"

# Left: zoom indicator + session pill.
# Zoom icon is its own segment, always visible (dim when not zoomed, yellow when zoomed).
# Session pill is blue, turns yellow when prefix is active.
set -g status-left "#[fg=#292e42,bg=#1f2335]#{?window_zoomed_flag,#[fg=#e0af68],}󰖯 #[bg=#7aa2f7,fg=#1d202f,bold]#{?client_prefix,#[bg=#e0af68],} #S #[default] "

# Right: cursor spend · claude spend · cpu · ram | date time
set -g status-right "#[fg=#c0caf5]#(~/.config/tmux/scripts/cursor_spend.sh) #[fg=#ff9e64]#(~/.config/tmux/scripts/claude_spend.sh) #[fg=#ff9e64]󰍛 #[fg=#c0caf5]#(~/.config/tmux/scripts/cpu.sh) #[fg=#565f89]· #[fg=#7dcfff]󰘚 #[fg=#c0caf5]#(~/.config/tmux/scripts/ram.sh)  #[fg=#c0caf5,bg=#292e42] %a %m/%d  %I:%M %p "

# Active window tab
set -g window-status-current-format "#[fg=#c0caf5,bg=#292e42] #I #W "

# Inactive window tab
set -g window-status-format "#[fg=#565f89,bg=default] #I #W "

set -g window-status-separator ""
set -g window-status-activity-style "bold"
set -g window-status-bell-style "bold"
# vim: ft=tmux
