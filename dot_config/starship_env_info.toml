"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 2000
add_newline = false
format = """\
$vcsh\
$fossil_branch\
$fossil_metrics\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$gleam\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$nats\
$direnv\
$env_var\
$crystal\
$custom\
$sudo"""

[zig]
symbol = " "
format = "[$symbol($version)]($style) "

[python]
symbol = "🐍 "
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style) "

[rust]
format = "[$symbol($version)]($style) "

[nodejs]
format = "[$symbol($version)]($style) "

[lua]
format = "[$symbol$version]($style) "

[golang]
symbol = "🐹 "
format = "[$symbol$version]($style) "

[c]
format = "[$symbol$version]($style) "

[cmake]
format = "[$symbol$version]($style) "

[swift]
symbol = "󰛥 "
format = "[$symbol($version )]($style)"

[package]
format = "[$symbol$version]($style) "

[container]
symbol = "📦"
format = "[$symbol]($style) "

[gcloud]
disabled = true

[aws]
disabled = true
